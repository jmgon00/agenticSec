<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f3460;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="ballGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f0f0f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0e0e0;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" fill="url(#bgGradient)"/>

  <!-- Soccer field lines (subtle) -->
  <line x1="200" y1="0" x2="200" y2="300" stroke="#00d9ff" stroke-width="2" opacity="0.3"/>
  <line x1="0" y1="150" x2="400" y2="150" stroke="#00d9ff" stroke-width="2" opacity="0.3"/>
  <circle cx="200" cy="150" r="40" fill="none" stroke="#00d9ff" stroke-width="1" opacity="0.2"/>

  <!-- Soccer ball (centered) -->
  <circle cx="200" cy="130" r="50" fill="url(#ballGradient)" stroke="#333" stroke-width="2"/>

  <!-- Ball pentagons pattern -->
  <g fill="none" stroke="#333" stroke-width="1.5">
    <!-- Top pentagon -->
    <path d="M 200 85 L 225 100 L 220 125 L 180 125 L 175 100 Z"/>
    <!-- Middle pentagon -->
    <path d="M 200 130 L 235 110 L 250 140 L 230 165 L 170 165 L 150 140 Z"/>
    <!-- Bottom pentagon -->
    <path d="M 200 175 L 225 160 L 220 185 L 180 185 L 175 160 Z"/>
  </g>

  <!-- Trophy accent (top right) -->
  <g fill="#ffd700">
    <path d="M 340 40 L 340 50 Q 340 55 345 55 L 355 55 Q 360 55 360 50 L 360 40 Z"/>
    <rect x="345" y="50" width="10" height="20" fill="#ffd700"/>
    <path d="M 340 70 Q 340 75 345 75 L 355 75 Q 360 75 360 70 Z" fill="#ffd700"/>
  </g>
  <circle cx="350" cy="35" r="8" fill="#ffd700" opacity="0.8"/>

  <!-- Flags accent (bottom left) -->
  <g>
    <!-- Flag 1 -->
    <rect x="30" y="220" width="3" height="40" fill="#666"/>
    <polygon points="33,220 33,228 45,224" fill="#4287f5"/>
    <!-- Flag 2 -->
    <rect x="50" y="225" width="3" height="35" fill="#666"/>
    <polygon points="53,225 53,233 65,229" fill="#ff6b6b"/>
    <!-- Flag 3 -->
    <rect x="70" y="220" width="3" height="40" fill="#666"/>
    <polygon points="73,220 73,228 85,224" fill="#f5d547"/>
  </g>

  <!-- Title text -->
  <text x="200" y="280" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#00d9ff" text-anchor="middle">
    Prode Mundialista
  </text>
  <text x="200" y="298" font-family="Arial, sans-serif" font-size="12" fill="#ff006e" text-anchor="middle" opacity="0.8">
    2026
  </text>
</svg>